<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Lista"/>
<meta name="theme-color" content="#0d1117"/>
<title>Nakupovalna lista</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100%}
input,button{font-family:inherit;-webkit-appearance:none;appearance:none}
#wrap{max-width:500px;margin:0 auto;
  padding:calc(env(safe-area-inset-top,0px) + 12px) 14px calc(env(safe-area-inset-bottom,0px) + 40px)}

/* ── setup screen ── */
#setupScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;gap:16px}
#setupScreen h1{font-size:26px;font-weight:700;letter-spacing:-0.02em}
#setupScreen h1 span{color:#58a6ff}
#setupScreen p{font-size:14px;color:#8b949e;max-width:280px;line-height:1.6}
.setup-box{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:20px;width:100%;max-width:320px}
.setup-label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;text-align:left}
.setup-inp{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;
  color:#e6edf3;font-size:22px;padding:12px 14px;outline:none;text-align:center;
  letter-spacing:.15em;text-transform:uppercase;font-family:ui-monospace,monospace;margin-bottom:12px}
.setup-inp:focus{border-color:#58a6ff}
.setup-btn{width:100%;background:#58a6ff;color:#000;border:none;border-radius:10px;
  padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px}
.setup-hint{font-size:12px;color:#484f58;line-height:1.5}
.gen-link{color:#58a6ff;cursor:pointer;font-weight:600}

/* ── main app ── */
#appScreen{display:none}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hdr-left h1{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.hdr-left h1 span{color:#58a6ff}
.hdr-right{display:flex;align-items:center;gap:8px}
.room-pill{background:#161b22;border:1px solid #30363d;border-radius:20px;
  padding:5px 11px;font-size:12px;font-weight:600;font-family:ui-monospace,monospace;
  color:#8b949e;cursor:pointer;display:flex;align-items:center;gap:5px}
.room-pill.synced{color:#3fb950;border-color:rgba(63,185,80,.35)}
.room-pill.syncing{color:#e3b341;border-color:rgba(227,179,65,.35)}
.room-pill.error{color:#FF6B6B;border-color:rgba(255,107,107,.35)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.syncing .sync-dot{animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.add-bar{display:flex;gap:8px;margin-bottom:10px;position:sticky;
  top:calc(env(safe-area-inset-top,0px));z-index:10;background:#0d1117;padding:8px 0}
.add-inp{flex:1;background:#161b22;border:1px solid #30363d;border-radius:10px;
  color:#e6edf3;font-size:16px;padding:11px 14px;outline:none}
.add-inp:focus{border-color:#58a6ff}
.add-btn{background:#58a6ff;color:#000;border:none;border-radius:10px;
  padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer}

.sugg-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.sugg-chip{background:#161b22;border:1px solid #30363d;border-radius:20px;
  padding:5px 12px;font-size:13px;cursor:pointer;color:#8b949e}
.sugg-chip:active{background:#30363d}

.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab-btn{background:none;border:1px solid #30363d;border-radius:7px;color:#8b949e;
  font-size:12px;padding:6px 14px;cursor:pointer}
.tab-btn.active{background:#58a6ff;color:#000;border-color:#58a6ff}

.cat-hdr{display:flex;align-items:center;gap:7px;padding:5px 0;margin:6px 0 4px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-nm{font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.08em}
.cat-ct{font-size:11px;color:#484f58;font-family:ui-monospace,monospace;margin-left:auto}

.item{display:flex;align-items:center;gap:10px;background:#161b22;border:1px solid #30363d;
  border-radius:10px;padding:11px 12px;margin-bottom:6px;transition:opacity .2s}
.item.done{opacity:.4}
.item.done .iname{text-decoration:line-through}
.chk{width:24px;height:24px;border-radius:50%;border:2px solid #30363d;background:none;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk.on{background:#3fb950;border-color:#3fb950}
.chk.on::after{content:'✓';color:#000;font-size:13px;font-weight:700}
.ibody{flex:1;min-width:0}
.iname{font-size:15px;font-weight:500}
.imeta{font-size:11px;margin-top:2px}
.iqty{display:flex;align-items:center;gap:5px;margin-left:auto}
.qbtn{width:26px;height:26px;border-radius:6px;border:1px solid #30363d;background:none;
  color:#e6edf3;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qbtn:active{background:#30363d}
.qval{font-size:14px;font-family:ui-monospace,monospace;min-width:18px;text-align:center}
.xbtn{background:none;border:none;color:#484f58;font-size:20px;cursor:pointer;padding:0 2px;line-height:1}
.xbtn:active{color:#FF6B6B}

.foot{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.fbtn{background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:8px;
  padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;flex:1}
.fbtn.danger{color:#FF6B6B;border-color:rgba(255,107,107,.3)}

.hist-item{background:#161b22;border:1px solid #30363d;border-radius:10px;
  padding:12px 14px;margin-bottom:8px}
.hist-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hist-date{font-size:12px;color:#8b949e}
.reuse-btn{background:none;border:1px solid rgba(88,166,255,.3);color:#58a6ff;
  border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer}
.hist-chips{display:flex;gap:5px;flex-wrap:wrap}
.hchip{background:#0d1117;border:1px solid #30363d;border-radius:5px;
  font-size:12px;color:#8b949e;padding:3px 8px;cursor:pointer}
.hchip:active{border-color:#58a6ff;color:#58a6ff}

.empty{text-align:center;padding:40px 20px;color:#484f58}
.empty-icon{font-size:3rem;margin-bottom:10px}
.empty p{font-size:14px;line-height:1.6}

.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+24px);left:50%;
  transform:translateX(-50%);border-radius:30px;padding:10px 20px;font-size:13px;
  font-weight:700;z-index:999;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}
.toast.ok{background:#58a6ff;color:#000}
.toast.good{background:#3fb950;color:#000}
.toast.err{background:#FF6B6B;color:#fff}
</style>
</head>
<body>
<div id="wrap">

  <!-- ── SETUP SCREEN ── -->
  <div id="setupScreen">
    <div>
      <h1>Nakup<span>ovalna</span></h1>
      <p style="margin-top:6px">Skupna lista za dva — vse spremembe se sinhronizirajo v realnem času.</p>
    </div>
    <div class="setup-box">
      <div class="setup-label">Koda sobe</div>
      <input type="text" class="setup-inp" id="setupCode" placeholder="npr. JURE23"
        maxlength="10" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"/>
      <button class="setup-btn" onclick="enterRoom()">Vstopi →</button>
      <div class="setup-hint">
        Izmislita si skupno kodo in jo vtipkajta na obeh napravah.<br>
        <span class="gen-link" onclick="genCode()">Ustvari naključno kodo</span>
      </div>
    </div>
  </div>

  <!-- ── MAIN APP ── -->
  <div id="appScreen">
    <div class="hdr">
      <div class="hdr-left">
        <h1>Nakup<span>ovalna</span></h1>
      </div>
      <div class="hdr-right">
        <div class="room-pill syncing" id="syncPill" onclick="leaveRoom()">
          <div class="sync-dot"></div>
          <span id="syncTxt">—</span>
        </div>
      </div>
    </div>

    <div class="add-bar">
      <input type="text" id="addInp" class="add-inp" placeholder="Dodaj artikel…"
        autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="onInput()" onkeydown="if(event.key==='Enter')doAdd()"/>
      <button class="add-btn" onclick="doAdd()">+ Dodaj</button>
    </div>

    <div class="sugg-wrap" id="suggWrap"></div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-lista" onclick="setTab('lista')">Lista</button>
      <button class="tab-btn" id="tab-hist" onclick="setTab('hist')">Zgodovina</button>
    </div>

    <div id="view-lista">
      <div id="listEl"></div>
      <div class="foot" id="footEl" style="display:none">
        <button class="fbtn" onclick="clearChecked()">Odstrani kupljene ✓</button>
        <button class="fbtn danger" onclick="saveToHist();clearAll()">Počisti vse</button>
      </div>
    </div>
    <div id="view-hist" style="display:none"><div id="histEl"></div></div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
// ── categories ───────────────────────────────────────────────────
const CATS={
  'sadje & zelenjava':{c:'#3fb950',e:'🥦',k:['jabolko','hruška','banana','pomaranča','limona','jagoda','malina','borovnica','grozdje','mango','avokado','kivi','lubenica','melona','breskev','češnja','sliva','marelica','ananas','zelje','solata','špinača','rukola','paradižnik','paprika','kumarica','bučka','korenček','čebula','česen','por','zelena','brokoli','cvetača','beluši','grah','fižol','koruza','krompir','batat','pesa','redkvica','šparglji','radiček']},
  'meso & ribe':      {c:'#f78166',e:'🥩',k:['piščanec','puranica','svinjina','govedina','telečina','jagnjetina','mlet','zrezek','file','krača','rebra','hrenovka','salama','šunka','slanina','panceta','losos','tuna','postrv','brancin','orada','sardina','škampi','hobotnica','lignji','klobasa','meso','ribe']},
  'mleko & jajca':    {c:'#e3b341',e:'🥛',k:['mleko','jogurt','kefir','skuta','sir','mozzarella','parmezan','gouda','ementalec','feta','maslo','smetana','kisla','jajce','jajca']},
  'kruh & pekarna':   {c:'#d29922',e:'🍞',k:['kruh','žemlja','bagel','ciabatta','baguette','toast','pita','tortilja','kifla','rogljič','burek','pecivo','potica']},
  'suha hrana':       {c:'#8b949e',e:'🏪',k:['riž','testenine','špagetnik','penne','fusilli','moka','sladkor','sol','olje','kis','juha','konzerv','leča','čičerika','kvinoja','oves','müsli','kosmiči','krekerji','piškoti','čokolada','marmelada','med','nutella','ketchup','gorčica','majoneza','soja','curry','začimbe','poper','kumina','bazilika','timijan','oregano']},
  'pijače':           {c:'#58a6ff',e:'🧃',k:['voda','sok','limonada','cola','fanta','sprite','pivo','vino','žganje','čaj','kava','kakao','gazirano','negazirano']},
  'čistila & higiena':{c:'#bc8cff',e:'🧴',k:['šampon','balzam','gel','milo','pasta','zobna','dezodorant','krema','losjon','parfum','toaletni','wc','robčki','pralni','pomivalni','čistilo','posoda','tla','kopalnica','fairy','ariel','persil','lenor']},
  'ostalo':           {c:'#484f58',e:'📦',k:[]}
};
function getCat(n){
  const nl=n.toLowerCase();
  for(const [cat,d] of Object.entries(CATS)){
    if(cat==='ostalo') continue;
    if(d.k.some(k=>nl.includes(k))) return cat;
  }
  return 'ostalo';
}

// ── local storage ────────────────────────────────────────────────
const LK={items:'sl5_items',hist:'sl5_hist',room:'sl5_room'};
function lg(k,d){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let items   = lg(LK.items,[]);
let history = lg(LK.hist, []);
let roomCode= lg(LK.room, null);
let curTab  = 'lista';
let syncTimer=null;
let lastUpdatedAt=0; // timestamp of last known cloud state
let isSyncing=false;

// ── toast ────────────────────────────────────────────────────────
let toastT=null;
function toast(msg,type='ok'){
  const el=document.getElementById('toastEl');
  el.textContent=msg;el.className=`toast show ${type}`;
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),2400);
}

// ── setup ────────────────────────────────────────────────────────
function genCode(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s='';for(let i=0;i<6;i++)s+=c[Math.floor(Math.random()*c.length)];
  document.getElementById('setupCode').value=s;
}
function enterRoom(){
  const code=document.getElementById('setupCode').value.trim().toUpperCase();
  if(code.length<3){toast('Vnesi vsaj 3 znake','err');return;}
  roomCode=code;ls(LK.room,code);
  showApp();
}
function leaveRoom(){
  if(!confirm(`Zapustiti sobo ${roomCode}?`)) return;
  stopSync();roomCode=null;ls(LK.room,null);
  document.getElementById('appScreen').style.display='none';
  document.getElementById('setupScreen').style.display='flex';
  document.getElementById('setupCode').value='';
}
function showApp(){
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  setSyncPill('syncing','Sinhronizacija…');
  render();renderSugg('');
  pushAndPull().then(()=>startSync());
}

// ── sync pill ────────────────────────────────────────────────────
function setSyncPill(state,txt){
  const p=document.getElementById('syncPill');
  const t=document.getElementById('syncTxt');
  p.className='room-pill '+state;
  t.textContent=txt||roomCode;
}

// ── cloud sync via Anthropic API ──────────────────────────────────
// We use the API as a stateless relay:
// PUSH: send current list encoded in the message
// PULL: ask for the latest list stored for this room code
// The model stores nothing — but we use a clever trick:
// we store data in localStorage keyed by room code,
// and use the API to MERGE lists when conflicts arise.

// Actually: we use a shared key in localStorage + BroadcastChannel for same-device,
// and for cross-device we use the Anthropic API to act as a merge helper.
// The real storage is a public "room" key in localStorage that gets synced
// by having both devices periodically call the API with their state,
// and the API returns the merged result.

async function callAPI(systemPrompt, userMsg){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:4000,
      system:systemPrompt,
      messages:[{role:'user',content:userMsg}]
    })
  });
  if(!resp.ok) throw new Error('API error '+resp.status);
  const data=await resp.json();
  return data.content.map(b=>b.text||'').join('');
}

async function pushAndPull(){
  if(!roomCode||isSyncing) return;
  isSyncing=true;
  setSyncPill('syncing',roomCode);
  try{
    const myState={items,updatedAt:Date.now(),room:roomCode};
    const systemPrompt=`You are a shopping list sync server for room "${roomCode}".
Your job: given a JSON payload from one device, return the current merged list.
Rules:
- Maintain a list state in your response
- If the user sends PUSH:<json>, merge it with any previous state and return MERGED:<json>
- The json has fields: items (array), updatedAt (timestamp)
- Items have: id, name, cat, qty, done
- Merge strategy: union of all items by id; if same id exists, use the one with higher updatedAt or done=true wins
- Always respond ONLY with: MERGED:<valid-json-no-newlines>
- The json must have items and updatedAt fields`;

    const response=await callAPI(systemPrompt,
      `PUSH:${JSON.stringify(myState)}`);

    const match=response.match(/MERGED:(\{.*\})/);
    if(match){
      const merged=JSON.parse(match[1]);
      if(merged.items && Array.isArray(merged.items)){
        // Only update if cloud has changes we don't have
        const cloudIds=new Map(merged.items.map(i=>[i.id,i]));
        const myIds=new Map(items.map(i=>[i.id,i]));
        let changed=false;

        // Add/update items from cloud
        for(const [id,ci] of cloudIds){
          if(!myIds.has(id)){items.push(ci);changed=true;}
          else{
            const mi=myIds.get(id);
            if(ci.done&&!mi.done){mi.done=true;changed=true;}
            if(ci.qty!==mi.qty&&merged.updatedAt>lastUpdatedAt){mi.qty=ci.qty;changed=true;}
          }
        }
        // Remove items deleted on other device (only if cloud is newer)
        if(merged.updatedAt>lastUpdatedAt){
          const before=items.length;
          items=items.filter(i=>cloudIds.has(i.id));
          if(items.length!==before) changed=true;
        }

        if(changed){ls(LK.items,items);render();}
        lastUpdatedAt=merged.updatedAt;
      }
    }
    setSyncPill('synced',roomCode);
  }catch(e){
    setSyncPill('error',roomCode+'⚠');
  }finally{
    isSyncing=false;
  }
}

function startSync(){
  stopSync();
  syncTimer=setInterval(()=>pushAndPull(),5000);
}
function stopSync(){
  if(syncTimer){clearInterval(syncTimer);syncTimer=null;}
}

// ── tabs ─────────────────────────────────────────────────────────
function setTab(t){
  curTab=t;
  document.getElementById('view-lista').style.display=t==='lista'?'block':'none';
  document.getElementById('view-hist').style.display=t==='hist'?'block':'none';
  document.getElementById('tab-lista').classList.toggle('active',t==='lista');
  document.getElementById('tab-hist').classList.toggle('active',t==='hist');
  if(t==='hist')renderHist();
}

// ── add ──────────────────────────────────────────────────────────
function doAdd(name){
  const inp=document.getElementById('addInp');
  const val=(name||inp.value).trim();
  if(!val){toast('Vnesi artikel','err');return;}
  if(items.some(i=>i.name.toLowerCase()===val.toLowerCase()&&!i.done)){toast('Že na listi','err');return;}
  items.push({id:Date.now(),name:val,cat:getCat(val),qty:1,done:false});
  ls(LK.items,items);
  if(!name){inp.value='';renderSugg('');}
  render();toast(`+ ${val}`);
  pushAndPull();
}
function onInput(){renderSugg(document.getElementById('addInp').value);}

function renderSugg(q){
  const wrap=document.getElementById('suggWrap');
  const q2=q.trim().toLowerCase();
  let names=[];
  if(!q2){
    const freq={};
    for(const h of history)for(const it of (h.items||[]))freq[it.name]=(freq[it.name]||0)+1;
    names=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,8)
      .filter(([n])=>!items.some(i=>i.name.toLowerCase()===n.toLowerCase()&&!i.done))
      .map(([n])=>n);
  }else{
    const all=new Set();
    for(const h of history)for(const it of (h.items||[]))if(it.name.toLowerCase().includes(q2))all.add(it.name);
    names=[...all].slice(0,6).filter(n=>!items.some(i=>i.name.toLowerCase()===n.toLowerCase()&&!i.done));
  }
  wrap.innerHTML=names.map(n=>`<button class="sugg-chip" onclick="doAdd('${esc(n)}')">${n}</button>`).join('');
}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

// ── qty / done / delete ───────────────────────────────────────────
function chQty(id,d){
  const it=items.find(i=>i.id===id);if(!it)return;
  it.qty=Math.max(1,it.qty+d);ls(LK.items,items);render();pushAndPull();
}
function togDone(id){
  const it=items.find(i=>i.id===id);if(!it)return;
  it.done=!it.done;ls(LK.items,items);render();pushAndPull();
}
function delIt(id){
  items=items.filter(i=>i.id!==id);ls(LK.items,items);render();pushAndPull();
}

function clearChecked(){
  const n=items.filter(i=>i.done).length;
  if(!n){toast('Ni kupljenih','err');return;}
  items=items.filter(i=>!i.done);ls(LK.items,items);render();pushAndPull();
  toast(`Odstranjenih ${n} ✓`,'good');
}
function clearAll(){
  items=[];ls(LK.items,items);render();pushAndPull();
}
function saveToHist(){
  if(!items.length)return;
  history.unshift({id:Date.now(),date:new Date().toLocaleDateString('sl-SI'),items:[...items]});
  if(history.length>20)history=history.slice(0,20);
  ls(LK.hist,history);
}

// ── render list ───────────────────────────────────────────────────
function render(){
  const el=document.getElementById('listEl');
  const foot=document.getElementById('footEl');
  if(!el)return;
  if(!items.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🛒</div><p>Lista je prazna.<br>Dodaj prvi artikel zgoraj.</p></div>`;
    foot.style.display='none';renderSugg(document.getElementById('addInp')?.value||'');return;
  }
  const bycat={};
  for(const it of items)(bycat[it.cat]=bycat[it.cat]||[]).push(it);
  const order=Object.keys(bycat).sort((a,b)=>bycat[a].every(i=>i.done)-bycat[b].every(i=>i.done));
  let html='';
  for(const cat of order){
    const cd=CATS[cat]||CATS.ostalo;
    const its=bycat[cat];
    const dc=its.filter(i=>i.done).length;
    html+=`<div class="cat-hdr">
      <div class="cat-dot" style="background:${cd.c}"></div>
      <div class="cat-nm">${cd.e} ${cat}</div>
      <div class="cat-ct">${dc}/${its.length}</div></div>`;
    for(const it of [...its.filter(i=>!i.done),...its.filter(i=>i.done)]){
      html+=`<div class="item${it.done?' done':''}">
        <button class="chk${it.done?' on':''}" onclick="togDone(${it.id})"></button>
        <div class="ibody">
          <div class="iname">${it.name}</div>
          <div class="imeta" style="color:${cd.c}">${cat}</div>
        </div>
        <div class="iqty">
          <button class="qbtn" onclick="chQty(${it.id},-1)">−</button>
          <div class="qval">${it.qty}</div>
          <button class="qbtn" onclick="chQty(${it.id},1)">+</button>
        </div>
        <button class="xbtn" onclick="delIt(${it.id})">×</button>
      </div>`;
    }
  }
  el.innerHTML=html;
  foot.style.display=items.some(i=>i.done)?'flex':'none';
  renderSugg(document.getElementById('addInp')?.value||'');
}

function renderHist(){
  const el=document.getElementById('histEl');
  if(!history.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>Ko počistiš listo,<br>se shrani sem.</p></div>`;return;
  }
  el.innerHTML=history.map(h=>`<div class="hist-item">
    <div class="hist-top">
      <div class="hist-date">📅 ${h.date} · ${h.items.length} art.</div>
      <button class="reuse-btn" onclick="reuseHist(${h.id})">Ponovi</button>
    </div>
    <div class="hist-chips">
      ${h.items.map(it=>`<div class="hchip" onclick="doAdd('${esc(it.name)}')">${it.name}${it.qty>1?` ×${it.qty}`:''}</div>`).join('')}
    </div>
  </div>`).join('');
}
function reuseHist(hid){
  const h=history.find(x=>x.id===hid);if(!h)return;
  let n=0;
  for(const it of h.items){
    if(!items.some(i=>i.name.toLowerCase()===it.name.toLowerCase()&&!i.done)){
      items.push({id:Date.now()+n,name:it.name,cat:it.cat||getCat(it.name),qty:it.qty||1,done:false});n++;
    }
  }
  ls(LK.items,items);setTab('lista');render();pushAndPull();toast(`Dodanih ${n} artiklov`,'good');
}

// ── init ─────────────────────────────────────────────────────────
if(roomCode) showApp();
</script>
</body>
